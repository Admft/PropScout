<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropScout Pro | Enterprise Risk Analyst</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <header class="bg-slate-900 text-white p-6 shadow-md border-b-4 border-blue-600">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">PropScout <span class="font-light text-blue-400">Pro</span></h1>
            <span class="text-sm font-medium bg-slate-800 border border-slate-700 px-3 py-1 rounded-full text-slate-300">DFW Commercial Underwriter</span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-sm border border-slate-200">
        <h2 class="text-xl font-semibold mb-4 text-slate-800">Run Deal Analysis</h2>
        
        <div class="flex flex-col md:flex-row gap-4 mb-6">
            <input type="text" id="zillowUrl" placeholder="Paste Zillow URL here (Required)..." class="flex-[2] p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="text" id="propertyAddress" placeholder="Address (Optional - Auto-extracted)" class="flex-1 p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
            <button onclick="analyzeDeal()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition-colors shadow-sm">
                Analyze
            </button>
        </div>

        <div id="loading" class="hidden text-center py-12">
            <div class="animate-spin inline-block w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
            <p class="text-slate-600 font-medium">Underwriting property... crunching financials and querying GPT-4o.</p>
        </div>

        <div id="results" class="hidden mt-8 border-t border-slate-200 pt-8">
            <div class="flex justify-between items-start mb-8">
                <div>
                    <h3 id="resAddress" class="text-2xl font-bold text-slate-900"></h3>
                    <div class="flex gap-4 mt-2 text-sm font-medium text-slate-500">
                        <p>Zillow: <span id="resZillowPrice" class="text-slate-700"></span></p>
                        <p>RentCast: <span id="resRentcastPrice" class="text-slate-700"></span></p>
                    </div>
                </div>
                <div class="text-right bg-slate-50 p-4 rounded-lg border border-slate-200">
                    <span id="resVerdict" class="text-4xl font-black block tracking-tight"></span>
                    <span id="resScore" class="text-sm font-bold text-slate-500 uppercase tracking-wide mt-1 block"></span>
                </div>
            </div>

            <h4 class="font-bold text-slate-800 mb-4 border-b pb-2">Computed Financials</h4>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <span class="text-xs text-blue-800 font-bold uppercase tracking-wider block mb-1">Cap Rate</span>
                    <span id="resCapRate" class="text-2xl font-black text-blue-900"></span>
                </div>
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <span class="text-xs text-blue-800 font-bold uppercase tracking-wider block mb-1">DSCR</span>
                    <span id="resDscr" class="text-2xl font-black text-blue-900"></span>
                </div>
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                    <span class="text-xs text-slate-500 font-bold uppercase tracking-wider block mb-1">Annual NOI</span>
                    <span id="resNoi" class="text-xl font-bold text-slate-700"></span>
                </div>
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                    <span class="text-xs text-slate-500 font-bold uppercase tracking-wider block mb-1">Est. Monthly Rent</span>
                    <span id="resRent" class="text-xl font-bold text-slate-700"></span>
                </div>
            </div>

            <div class="bg-slate-800 p-6 rounded-lg shadow-inner mb-6 text-white">
                <h4 class="font-bold text-blue-300 mb-2 uppercase text-xs tracking-wider">Executive Summary</h4>
                <p id="resSummary" class="text-slate-200 leading-relaxed text-lg"></p>
            </div>

            <div class="grid md:grid-cols-3 gap-6 mt-6">
                <div class="bg-red-50 p-5 rounded-lg border border-red-200">
                    <h4 class="font-bold text-red-800 mb-3 uppercase text-xs tracking-wider flex items-center gap-2">🛑 Critical Flags</h4>
                    <ul id="resCriticalFlags" class="list-disc pl-5 text-red-700 space-y-2 text-sm font-medium"></ul>
                </div>

                <div class="bg-amber-50 p-5 rounded-lg border border-amber-200">
                    <h4 class="font-bold text-amber-800 mb-3 uppercase text-xs tracking-wider flex items-center gap-2">⚠️ Market Warnings</h4>
                    <ul id="resWarnings" class="list-disc pl-5 text-amber-700 space-y-2 text-sm font-medium"></ul>
                </div>

                <div class="bg-emerald-50 p-5 rounded-lg border border-emerald-200">
                    <h4 class="font-bold text-emerald-800 mb-3 uppercase text-xs tracking-wider flex items-center gap-2">💡 Value Add Ops</h4>
                    <ul id="resValueAdd" class="list-disc pl-5 text-emerald-700 space-y-2 text-sm font-medium"></ul>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Helper function for currency formatting
        const formatCurrency = (num) => num ? new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num) : "N/A";

        async function analyzeDeal() {
            const url = document.getElementById('zillowUrl').value;
            const address = document.getElementById('propertyAddress').value;
            
            if (!url) {
                alert("A Zillow URL is required to run the analysis.");
                return;
            }

            // Show loading, hide results
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            try {
                const response = await fetch('http://localhost:7071/api/AnalyzeProperty', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, address: address })
                });

                const data = await response.json();
                
                if (data.error) {
                    alert("API Error: " + data.error);
                    document.getElementById('loading').classList.add('hidden');
                    return;
                }

                // 1. Populate Header & Raw Data
                document.getElementById('resAddress').innerText = data.address.toUpperCase();
                document.getElementById('resZillowPrice').innerText = formatCurrency(data.raw_data_sources.zillow_price);
                document.getElementById('resRentcastPrice').innerText = formatCurrency(data.raw_data_sources.rentcast_valuation);
                
                // 2. Populate Financials
                document.getElementById('resCapRate').innerText = data.computed_financials.cap_rate + "%";
                document.getElementById('resDscr').innerText = data.computed_financials.dscr;
                document.getElementById('resNoi').innerText = formatCurrency(data.computed_financials.noi);
                document.getElementById('resRent').innerText = formatCurrency(data.computed_financials.monthly_rent_est);

                // 3. Populate AI Verdict
                const verdictEl = document.getElementById('resVerdict');
                const status = data.ai_underwriter.deal_status;
                verdictEl.innerText = status;
                
                if(status === "PASS") verdictEl.className = "text-4xl font-black block tracking-tight text-emerald-600";
                else verdictEl.className = "text-4xl font-black block tracking-tight text-red-600";

                document.getElementById('resScore').innerText = "Confidence Score: " + data.ai_underwriter.confidence_score + "/100";
                document.getElementById('resSummary').innerText = data.ai_underwriter.executive_summary;

                // 4. Populate Lists (Helper function to clear and fill ul elements)
                const fillList = (elementId, items) => {
                    const ul = document.getElementById(elementId);
                    ul.innerHTML = "";
                    if (!items || items.length === 0) {
                        ul.innerHTML = "<li class='text-slate-400 italic list-none'>None flagged.</li>";
                        return;
                    }
                    items.forEach(item => {
                        let li = document.createElement("li");
                        li.innerText = item;
                        ul.appendChild(li);
                    });
                };

                fillList('resCriticalFlags', data.ai_underwriter.risk_analysis.critical_flags);
                fillList('resWarnings', data.ai_underwriter.risk_analysis.market_warnings);
                fillList('resValueAdd', data.ai_underwriter.value_add_opportunities);

                // Hide loading, show results
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('results').classList.remove('hidden');

            } catch (error) {
                alert("Error connecting to the Risk Engine. Make sure 'func start' is running in your terminal.");
                console.error(error);
                document.getElementById('loading').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
